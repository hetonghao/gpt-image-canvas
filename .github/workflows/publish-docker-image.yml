name: AI Cove GHCR Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to publish, for example ai-cove-20260518T035430Z-8a4edd445b9e'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          build-args: |
            APT_MIRROR=http://deb.debian.org/debian
            APT_SECURITY_MIRROR=http://deb.debian.org/debian-security
            NPM_CONFIG_REGISTRY=https://registry.npmjs.org
          tags: ${{ steps.image.outputs.name }}:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.image_tag }}
